name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: ./mvnw clean package -DskipTests

      - name: Test
        run: ./mvnw test

  artifacts:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: ./mvnw clean package -DskipTests

      - name: Prepare release assets
        run: |
          cp target/zai-git.jar zai-git.jar
          chmod +x install.sh

      - uses: actions/upload-artifact@v4
        with:
          name: zai-git-release
          path: |
            zai-git.jar
            install.sh
            README.md
            HELP.md
            INSTALLATION.md
            TEST.md
          retention-days: 30
