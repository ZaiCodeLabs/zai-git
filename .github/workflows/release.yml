name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write  # REQUIRED!

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - run: ./mvnw clean package -DskipTests

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare assets
        run: |
          cp target/zai-git.jar "zai-git-${{ steps.version.outputs.VERSION }}.jar"
          chmod +x install.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            zai-git-${{ steps.version.outputs.VERSION }}.jar
            install.sh
          body: |
            # ZaiGit v${{ steps.version.outputs.VERSION }}
            
            **Quick Install:**
            ```bash
            wget https://github.com/ZaiCodeLabs/zai-git/releases/latest/download/install.sh
            chmod +x install.sh
            ./install.sh
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
